<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Litter Prevention Network</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; }
    .lang-bar { background: #1D9E75; padding: 8px 20px; text-align: right; }
    .lang-bar button { background: none; border: 1px solid white; color: white; padding: 4px 12px; border-radius: 20px; cursor: pointer; font-size: 13px; margin-left: 6px; }
    .lang-bar button.active { background: white; color: #1D9E75; }
    nav { background: white; padding: 14px 40px; display: flex; gap: 24px; align-items: center; box-shadow: 0 1px 4px rgba(0,0,0,0.06); flex-wrap: wrap; }
    nav a { text-decoration: none; color: #444; font-size: 15px; font-weight: 500; }
    nav a.active { color: #1D9E75; }
    .container { max-width: 460px; margin: 80px auto; background: white; border-radius: 16px; padding: 48px 40px; box-shadow: 0 2px 20px rgba(0,0,0,0.08); }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { color: #1D9E75; font-size: 22px; }
    .logo p { color: #666; font-size: 14px; margin-top: 4px; }
    .tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 28px; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: none; font-size: 15px; font-weight: 600; color: #999; cursor: pointer; }
    .tab-btn.active { color: #1D9E75; border-bottom: 3px solid #1D9E75; margin-bottom: -2px; }
    .form-group { margin-bottom: 18px; }
    label { display: block; font-size: 13px; font-weight: 600; color: #555; margin-bottom: 6px; }
    input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; outline: none; }
    input:focus { border-color: #1D9E75; }
    .btn { width: 100%; background: #1D9E75; color: white; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .btn:hover { background: #0F6E56; }
    .message { text-align: center; margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 14px; display: none; }
    .message.success { background: #E1F5EE; color: #0F6E56; }
    .message.error { background: #FDECEA; color: #c0392b; }
    .es { display: none; }
  </style>
</head>
<body>
<div class="lang-bar">
  <button class="active" onclick="setLang('en')">English</button>
  <button onclick="setLang('es')">Español</button>
</div>
<nav>
  <a href="index.html"><span class="en">Home</span><span class="es">Inicio</span></a>
  <a href="events.html"><span class="en">Events</span><span class="es">Eventos</span></a>
  <a href="report-litter.html"><span class="en">Report Litter</span><span class="es">Reportar Basura</span></a>
  <a href="rewards.html"><span class="en">Rewards</span><span class="es">Recompensas</span></a>
  <a href="volunteer.html"><span class="en">Volunteer</span><span class="es">Voluntario</span></a>
  <a href="submit-proof.html"><span class="en">Submit Proof</span><span class="es">Enviar Prueba</span></a>
  <a href="login.html" class="active"><span class="en">Login</span><span class="es">Iniciar Sesión</span></a>
</nav>

<div class="container">
  <div class="logo">
    <h1>🌿 Litter Prevention Network</h1>
    <p class="en">Willis, TX — Earn rewards for keeping our community clean</p>
    <p class="es">Willis, TX — Gana recompensas por mantener nuestra comunidad limpia</p>
  </div>

  <div class="tabs">
    <button class="tab-btn active" onclick="showTab('login')">
      <span class="en">Log In</span><span class="es">Iniciar Sesión</span>
    </button>
    <button class="tab-btn" onclick="showTab('signup')">
      <span class="en">Sign Up</span><span class="es">Registrarse</span>
    </button>
  </div>

  <!-- Login Form -->
  <div id="form-login">
    <div class="form-group">
      <label><span class="en">Email</span><span class="es">Correo</span></label>
      <input type="email" id="login-email" placeholder="you@email.com" />
    </div>
    <div class="form-group">
      <label><span class="en">Password</span><span class="es">Contraseña</span></label>
      <input type="password" id="login-password" placeholder="••••••••" />
    </div>
    <button class="btn" onclick="handleLogin()">
      <span class="en">Log In</span><span class="es">Iniciar Sesión</span>
    </button>
  </div>

  <!-- Signup Form -->
  <div id="form-signup" style="display:none">
    <div class="form-group">
      <label><span class="en">Full Name</span><span class="es">Nombre Completo</span></label>
      <input type="text" id="signup-name" placeholder="Jane Doe" />
    </div>
    <div class="form-group">
      <label><span class="en">Email</span><span class="es">Correo</span></label>
      <input type="email" id="signup-email" placeholder="you@email.com" />
    </div>
    <div class="form-group">
      <label><span class="en">Password</span><span class="es">Contraseña</span></label>
      <input type="password" id="signup-password" placeholder="Min. 6 characters" />
    </div>
    <button class="btn" onclick="handleSignup()">
      <span class="en">Create Account</span><span class="es">Crear Cuenta</span>
    </button>
  </div>

  <div class="message" id="msg"></div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const _sb = window.supabase.createClient(
  'https://elgzfppmlsrrmskgloeo.supabase.co',
  'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVsZ3pmcHBtbHNycm1za2dsb2VvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NTkxNTYsImV4cCI6MjA5MDIzNTE1Nn0.ec9avLt7Zz-41k2hOTFBs6KH0D5GmW6tCpdlcDSXRJc'
);

// Redirect if already logged in
_sb.auth.getSession().then(({ data }) => {
  if (data.session) window.location.href = 'dashboard.html';
});

function showTab(tab) {
  document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
  document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
  document.querySelectorAll('.tab-btn').forEach((b, i) => {
    b.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1));
  });
}

function showMsg(text, type) {
  const el = document.getElementById('msg');
  el.textContent = text;
  el.className = 'message ' + type;
  el.style.display = 'block';
}

async function handleLogin() {
  const email = document.getElementById('login-email').value;
  const password = document.getElementById('login-password').value;
  const { error } = await _sb.auth.signInWithPassword({ email, password });
  if (error) return showMsg(error.message, 'error');
  window.location.href = 'dashboard.html';
}

async function handleSignup() {
  const name = document.getElementById('signup-name').value;
  const email = document.getElementById('signup-email').value;
  const password = document.getElementById('signup-password').value;
  const { error } = await _sb.auth.signUp({
    email, password,
    options: { data: { full_name: name } }
  });
  if (error) return showMsg(error.message, 'error');
  showMsg('✅ Check your email to confirm your account!', 'success');
}

function setLang(lang) {
  document.querySelectorAll('.en').forEach(e => e.style.display = lang === 'en' ? '' : 'none');
  document.querySelectorAll('.es').forEach(e => e.style.display = lang === 'es' ? '' : 'none');
  document.querySelectorAll('.lang-bar button').forEach((b, i) => {
    b.classList.toggle('active', (lang === 'en' && i === 0) || (lang === 'es' && i === 1));
  });
}
</script>
</body>
</html>
