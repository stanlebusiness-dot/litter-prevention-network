<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#1D9E75" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login – Litter Prevention Network</title>
  <link rel="stylesheet" href="shared.css" />
  <style>
    .container { max-width: 460px; margin: 80px auto; background: white; border-radius: 16px; padding: 48px 40px; box-shadow: 0 2px 20px rgba(0,0,0,0.08); }
    .logo { text-align: center; margin-bottom: 28px; }
    .logo h1 { color: #1D9E75; font-size: 22px; }
    .logo p { color: #666; font-size: 14px; margin-top: 4px; }
    .tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 28px; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: none; font-size: 15px; font-weight: 600; color: #999; cursor: pointer; }
    .tab-btn.active { color: #1D9E75; border-bottom: 3px solid #1D9E75; margin-bottom: -2px; }
    .btn { width: 100%; background: #1D9E75; color: white; padding: 14px; border: none; border-radius: 8px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 8px; }
    .btn:hover { background: #0F6E56; }
    .message { text-align: center; margin-top: 16px; padding: 12px; border-radius: 8px; font-size: 14px; display: none; }
    .message.success { background: #E1F5EE; color: #0F6E56; }
    .message.error { background: #FDECEA; color: #c0392b; }
  </style>
</head>
<body>
  <div class="lang-bar">
    <button class="active" onclick="setLang('en')">English</button>
    <button onclick="setLang('es')">Español</button>
  </div>

  <div class="container">
    <div class="logo">
      <h1>🌿 Litter Prevention Network</h1>
      <p class="en">Willis, TX — Earn rewards for keeping our community clean</p>
      <p class="es">Willis, TX — Gana recompensas por mantener nuestra comunidad limpia</p>
    </div>
    <div class="tabs">
      <button class="tab-btn active" onclick="showTab('login')"><span class="en">Log In</span><span class="es">Iniciar Sesión</span></button>
      <button class="tab-btn" onclick="showTab('signup')"><span class="en">Sign Up</span><span class="es">Registrarse</span></button>
    </div>
    <div id="form-login">
      <div class="form-group">
        <label><span class="en">Email</span><span class="es">Correo</span></label>
        <input type="email" id="login-email" placeholder="you@email.com" />
      </div>
      <div class="form-group">
        <label><span class="en">Password</span><span class="es">Contraseña</span></label>
        <div style="position:relative">
          <input type="password" id="login-password" placeholder="••••••••" style="width:100%;padding:12px 44px 12px 16px;border:1px solid #ddd;border-radius:8px;font-size:15px;outline:none;" />
          <span onclick="togglePw('login-password',this)" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:13px;color:#888;">Show</span>
        </div>
      </div>
      <button class="btn" onclick="handleLogin()"><span class="en">Log In</span><span class="es">Iniciar Sesión</span></button>
    </div>
    <div id="form-signup" style="display:none">
      <div class="form-group">
        <label><span class="en">Full Name</span><span class="es">Nombre Completo</span></label>
        <input type="text" id="signup-name" placeholder="Jane Doe" />
      </div>
      <div class="form-group">
        <label><span class="en">Email</span><span class="es">Correo</span></label>
        <input type="email" id="signup-email" placeholder="you@email.com" />
      </div>
      <div class="form-group">
        <label><span class="en">Password</span><span class="es">Contraseña</span></label>
        <div style="position:relative">
          <input type="password" id="signup-password" placeholder="Min. 6 characters" style="width:100%;padding:12px 44px 12px 16px;border:1px solid #ddd;border-radius:8px;font-size:15px;outline:none;" />
          <span onclick="togglePw('signup-password',this)" style="position:absolute;right:14px;top:50%;transform:translateY(-50%);cursor:pointer;font-size:13px;color:#888;">Show</span>
        </div>
      </div>
      <button class="btn" onclick="handleSignup()"><span class="en">Create Account</span><span class="es">Crear Cuenta</span></button>
    </div>
    <div class="message" id="msg"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
  function togglePw(id, el) {
    const input = document.getElementById(id);
    input.type = input.type === 'password' ? 'text' : 'password';
    el.textContent = input.type === 'password' ? 'Show' : 'Hide';
  }
  const _sb = window.supabase.createClient(
    'https://elgzfppmlsrrmskgloeo.supabase.co',
    'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImVsZ3pmcHBtbHNycm1za2dsb2VvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ2NTkxNTYsImV4cCI6MjA5MDIzNTE1Nn0.ec9avLt7Zz-41k2hOTFBs6KH0D5GmW6tCpdlcDSXRJc'
  );
  _sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'dashboard.html';
  });
  function showTab(tab) {
    document.getElementById('form-login').style.display = tab === 'login' ? 'block' : 'none';
    document.getElementById('form-signup').style.display = tab === 'signup' ? 'block' : 'none';
    document.querySelectorAll('.tab-btn').forEach((b, i) => {
      b.classList.toggle('active', (tab === 'login' && i === 0) || (tab === 'signup' && i === 1));
    });
  }
  function showMsg(text, type) {
    const el = document.getElementById('msg');
    el.textContent = text;
    el.className = 'message ' + type;
    el.style.display = 'block';
  }
  async function handleLogin() {
    const email = document.getElementById('login-email').value;
    const password = document.getElementById('login-password').value;
    const { error } = await _sb.auth.signInWithPassword({ email, password });
    if (error) return showMsg(error.message, 'error');
    window.location.href = 'dashboard.html';
  }
  async function handleSignup() {
    const name = document.getElementById('signup-name').value;
    const email = document.getElementById('signup-email').value;
    const password = document.getElementById('signup-password').value;
    const { error } = await _sb.auth.signUp({ email, password, options: { data: { full_name: name } } });
    if (error) return showMsg(error.message, 'error');
    showMsg('✅ Check your email to confirm your account!', 'success');
  }
  </script>
  <script src="shared.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/service-worker.js');
    }
  </script>
</body>
</html>
